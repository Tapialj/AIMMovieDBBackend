name: On Merge with main

on:
  push:
    branches: [ "main" ]

jobs:
  version_and_build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: Generate semantic version based on git history
      id: version
      uses: paulhatch/semantic-version@v6.0.2
      with:
        tag_prefix: "v"
    - name: Set up JDK 21
      uses: actions/setup-java@v5.3.0
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Update Mvn Pom Version
      run: mvn versions:set -DnewVersion=${{ steps.version.outputs.version }}
    - name: Login to Docker
      uses: docker/login-action@v4.2.0
      with:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    - name: Build the Docker image
      run: >
        docker build --build-arg VERSION=${{ steps.version.outputs.version }} .
        -t tapialj/aimmoviedb-backend:${{ steps.version.outputs.version }}
        -t tapialj/aimmoviedb-backend:latest
    - name: Push Docker Image
      run:
        docker push --all-tags tapialj/aimmoviedb-backend
    - uses: fregante/setup-git-user@v2
    - name: Git Tag New Version
      run: |
        git tag -a v${{ steps.version.outputs.version }} -m"v${{ steps.version.outputs.version }}"
        git push origin tag v${{ steps.version.outputs.version }}
    - uses: ncipollo/release-action@v1.21.0
      with:
        tag: v${{ steps.version.outputs.version }}
